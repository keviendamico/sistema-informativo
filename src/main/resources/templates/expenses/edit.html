<!DOCTYPE html>
<html lang="it"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::main})}">
<head><title>Modifica Nota spese</title></head>
<body>
<main>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="mb-0">
            Nota spese —
            <span th:text="${T(java.time.Month).of(report.month)
                            .getDisplayName(T(java.time.format.TextStyle).FULL, new java.util.Locale('it'))
                            .substring(0,1).toUpperCase()
                            + T(java.time.Month).of(report.month)
                            .getDisplayName(T(java.time.format.TextStyle).FULL, new java.util.Locale('it'))
                            .substring(1)
                            + ' ' + report.year}"></span>
        </h4>
        <a th:href="@{/expenses}" class="btn btn-sm btn-outline-secondary">
            <i class="bi bi-arrow-left me-1"></i>Indietro
        </a>
    </div>

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <form th:action="@{/expenses/{id}/edit(id=${report.id})}"
          th:object="${form}" method="post">

        <div class="card border-0 shadow-sm mb-4">
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-3">
                        <label class="form-label fw-semibold">Commessa</label>
                        <select th:field="*{projectId}" class="form-select form-select-sm">
                            <option value="">— Nessuna —</option>
                            <option th:each="p : ${internalProjects}"
                                    th:value="${p.id}"
                                    th:text="${p.code + ' — ' + p.description}">
                            </option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-semibold">Veicolo</label>
                        <input type="text" th:field="*{vehicle}" class="form-control form-control-sm"
                               placeholder="Es. Fiat Panda">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label fw-semibold">Cilindrata (cc)</label>
                        <input type="number" th:field="*{engineCc}" class="form-control form-control-sm"
                               min="0" step="1">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label fw-semibold">Targa</label>
                        <input type="text" th:field="*{plate}" class="form-control form-control-sm"
                               placeholder="Es. AB123CD">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label fw-semibold">N° allegati fisici</label>
                        <input type="number" th:field="*{attachmentCount}" class="form-control form-control-sm"
                               min="0" step="1">
                    </div>
                    <div class="col-12">
                        <label class="form-label fw-semibold">Note</label>
                        <textarea th:field="*{notes}" class="form-control form-control-sm" rows="2"
                                  placeholder="Note aggiuntive..."></textarea>
                    </div>
                </div>
            </div>
        </div>

        <div class="card border-0 shadow-sm mb-4">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-sm table-bordered mb-0">
                        <thead class="table-light">
                            <tr>
                                <th style="min-width:50px">GG</th>
                                <th style="min-width:80px">Km</th>
                                <th style="min-width:180px">Tragitto</th>
                                <th style="min-width:55px" class="text-center">A/R</th>
                                <th style="min-width:90px">Mezzo</th>
                                <th style="min-width:90px">Pasti (€)</th>
                                <th style="min-width:90px">Hotel (€)</th>
                                <th style="min-width:90px">Altro (€)</th>
                                <th style="min-width:180px">Causale</th>
                                <th style="min-width:110px">Pagamento</th>
                                <th style="min-width:40px"></th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${#lists.isEmpty(form.rows)}">
                                <td colspan="11" class="text-center text-muted py-3">
                                    Nessuna riga. Usa "Aggiungi riga" per iniziare.
                                </td>
                            </tr>
                            <tr th:each="row, rowStat : ${form.rows}">
                                <td>
                                    <input type="number"
                                           th:field="*{rows[__${rowStat.index}__].day}"
                                           class="form-control form-control-sm"
                                           min="1" max="31" step="1">
                                </td>
                                <td>
                                    <input type="number"
                                           th:field="*{rows[__${rowStat.index}__].km}"
                                           class="form-control form-control-sm"
                                           min="0" step="0.01">
                                </td>
                                <td>
                                    <input type="text"
                                           th:field="*{rows[__${rowStat.index}__].route}"
                                           class="form-control form-control-sm"
                                           placeholder="Es. Milano → Roma">
                                </td>
                                <td class="text-center align-middle">
                                    <input type="checkbox"
                                           th:field="*{rows[__${rowStat.index}__].roundTrip}"
                                           class="form-check-input">
                                </td>
                                <td>
                                    <select th:field="*{rows[__${rowStat.index}__].vehicleType}"
                                            class="form-select form-select-sm">
                                        <option value="">—</option>
                                        <option th:each="vt : ${vehicleTypes}"
                                                th:value="${vt.name()}"
                                                th:text="${vt.label}">
                                        </option>
                                    </select>
                                </td>
                                <td>
                                    <input type="number"
                                           th:field="*{rows[__${rowStat.index}__].mealAmount}"
                                           class="form-control form-control-sm"
                                           min="0" step="0.01">
                                </td>
                                <td>
                                    <input type="number"
                                           th:field="*{rows[__${rowStat.index}__].accommodationAmount}"
                                           class="form-control form-control-sm"
                                           min="0" step="0.01">
                                </td>
                                <td>
                                    <input type="number"
                                           th:field="*{rows[__${rowStat.index}__].otherAmount}"
                                           class="form-control form-control-sm"
                                           min="0" step="0.01">
                                </td>
                                <td>
                                    <input type="text"
                                           th:field="*{rows[__${rowStat.index}__].description}"
                                           class="form-control form-control-sm">
                                </td>
                                <td>
                                    <select th:field="*{rows[__${rowStat.index}__].paymentMethod}"
                                            class="form-select form-select-sm">
                                        <option value="">—</option>
                                        <option th:each="pm : ${paymentMethods}"
                                                th:value="${pm.name()}"
                                                th:text="${pm.label}">
                                        </option>
                                    </select>
                                </td>
                                <td class="text-center align-middle">
                                    <button type="submit" name="removeRow"
                                            th:value="${rowStat.index}"
                                            class="btn btn-outline-danger btn-sm"
                                            data-bs-toggle="tooltip" title="Rimuovi riga">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div class="text-center py-2 border-top">
                    <button type="submit" name="addRow" class="btn btn-outline-primary btn-sm">
                        <i class="bi bi-plus-lg me-1"></i>Aggiungi riga
                    </button>
                </div>
            </div>
        </div>

        <div class="d-flex gap-2 flex-wrap">
            <button type="submit" class="btn btn-rxt btn-sm">
                <i class="bi bi-floppy me-1"></i>Salva
            </button>
            <a th:href="@{/expenses}" class="btn btn-outline-secondary btn-sm">Annulla</a>
        </div>

    </form>

</main>
</body>
</html>
