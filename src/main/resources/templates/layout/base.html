<!DOCTYPE html>
<html lang="it"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="layout(content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' — Sistema Informativo REXtart'">Sistema Informativo REXtart</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/webjars/bootstrap-icons/font/bootstrap-icons.min.css}">
    <link rel="stylesheet" th:href="@{/css/custom.css}">
</head>
<body>

<nav class="navbar navbar-expand-lg si-navbar fixed-top">
    <div class="container-fluid px-3">
        <a class="navbar-brand" th:href="@{/timesheet}">
            <img th:src="@{/image/logo-rextart.svg}" alt="Rextart" height="22">
        </a>
        <div class="ms-auto d-flex align-items-center gap-3">
            <span class="text-white small" sec:authentication="name"></span>
            <form th:action="@{/logout}" method="post" class="d-inline m-0">
                <button type="submit" class="btn btn-sm si-btn-logout">
                    <i class="bi bi-box-arrow-right"></i> Esci
                </button>
            </form>
        </div>
    </div>
</nav>

<div class="si-sidebar">
    <nav class="si-sidebar-nav">
        <ul class="list-unstyled mb-0">
            <li>
                <a th:href="@{/timesheet}"
                   th:classappend="${activePage == 'timesheet'} ? 'active'"
                   class="si-sidebar-link">
                    <i class="bi bi-calendar3"></i>
                    <span>Timesheet</span>
                </a>
            </li>
            <li>
                <a th:href="@{/templates}"
                   th:classappend="${activePage == 'templates'} ? 'active'"
                   class="si-sidebar-link">
                    <i class="bi bi-file-earmark-pdf"></i>
                    <span>Template</span>
                </a>
            </li>
            <li>
                <a th:href="@{/expenses}"
                   th:classappend="${activePage == 'expenses'} ? 'active'"
                   class="si-sidebar-link">
                    <i class="bi bi-receipt"></i>
                    <span>Note spese</span>
                </a>
            </li>
        </ul>

        <div sec:authorize="hasRole('ADMIN')">
            <div class="si-sidebar-section-title">Admin</div>
            <ul class="list-unstyled mb-0">
                <li>
                    <a th:href="@{/admin/users}"
                       th:classappend="${activePage == 'admin-users'} ? 'active'"
                       class="si-sidebar-link">
                        <i class="bi bi-people"></i>
                        <span>Utenti</span>
                    </a>
                </li>
                <li>
                    <a th:href="@{/admin/projects}"
                       th:classappend="${activePage == 'admin-projects'} ? 'active'"
                       class="si-sidebar-link">
                        <i class="bi bi-briefcase"></i>
                        <span>Commesse</span>
                    </a>
                </li>
            </ul>
        </div>
    </nav>
</div>

<main class="si-main-content">
    <div th:replace="${content}"></div>
</main>

<div class="modal fade" id="confirmModal" data-bs-backdrop="static" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Conferma operazione</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p id="confirmModalMessage" class="mb-0"></p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annulla</button>
                <button type="button" class="btn btn-danger" id="confirmModalProceed">Conferma</button>
            </div>
        </div>
    </div>
</div>

<form id="confirmModalForm" method="post" th:action="@{/}" style="display:none"></form>

<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/js/templates.js}"></script>
<script>
    document.querySelectorAll('[data-bs-toggle="tooltip"]').forEach(el => {
        new bootstrap.Tooltip(el);
    });

    (function () {
        const modal = document.getElementById('confirmModal');
        const form  = document.getElementById('confirmModalForm');

        modal.addEventListener('show.bs.modal', function (event) {
            const trigger = event.relatedTarget;
            const action  = trigger.getAttribute('data-confirm-action');
            const message = trigger.getAttribute('data-confirm-message')
                || 'Sei sicuro di voler procedere? L\'operazione non potrà essere annullata.';

            document.getElementById('confirmModalMessage').textContent = message;
            form.action = action;
        });

        document.getElementById('confirmModalProceed').addEventListener('click', function () {
            form.submit();
        });
    })();
</script>
</body>
</html>
