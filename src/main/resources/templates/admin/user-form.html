<!DOCTYPE html>
<html lang="it"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::main})}">
<head><title>Utente</title></head>
<body>
<main>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="mb-0" th:text="${isEdit} ? 'Modifica utente' : 'Nuovo utente'"></h4>
        <a th:href="@{/admin/users}" class="btn btn-sm btn-outline-secondary">
            <i class="bi bi-arrow-left me-1"></i>Indietro
        </a>
    </div>

    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body" style="max-width: 720px;">
            <form th:action="${isEdit} ? @{/admin/users/{id}(id=${userId})} : @{/admin/users}"
                  th:object="${form}" method="post">

                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Nome <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" th:field="*{firstName}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Cognome <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" th:field="*{lastName}" required>
                    </div>
                </div>

                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Username <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" th:field="*{username}"
                               th:readonly="${isEdit}" required>
                        <div th:if="${isEdit}" class="form-text">Non modificabile dopo la creazione.</div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Email <span class="text-danger">*</span></label>
                        <input type="email" class="form-control" th:field="*{email}" required>
                    </div>
                </div>

                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label class="form-label">
                            Password
                            <span th:if="${!isEdit}" class="text-danger">*</span>
                            <span th:if="${isEdit}"  class="text-muted small">(lascia vuoto per non modificarla)</span>
                        </label>
                        <input type="password" class="form-control" th:field="*{password}"
                               th:required="${!isEdit}" autocomplete="new-password">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Ruolo <span class="text-danger">*</span></label>
                        <select class="form-select" th:field="*{role}" required>
                            <option value="EMPLOYEE">Employee</option>
                            <option value="ADMIN">Admin</option>
                        </select>
                    </div>
                    <div class="col-md-3 d-flex align-items-end pb-1">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" th:field="*{active}" id="activeCheck">
                            <label class="form-check-label" for="activeCheck">Utente attivo</label>
                        </div>
                    </div>
                </div>

                <div class="mb-4" th:if="${!#lists.isEmpty(allProjects)}">
                    <label class="form-label">Commesse assegnate</label>
                    <div class="row row-cols-2 row-cols-md-3 g-2">
                        <div class="col" th:each="p : ${allProjects}">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox"
                                       name="projectIds"
                                       th:value="${p.id}"
                                       th:checked="${form.projectIds != null and form.projectIds.contains(p.id)}"
                                       th:id="'proj-' + ${p.id}">
                                <label class="form-check-label" th:for="'proj-' + ${p.id}">
                                    <span th:text="${p.code}"></span>
                                    <span th:if="${p.description}" class="text-muted small"
                                          th:text="' — ' + ${p.description}"></span>
                                </label>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-rxt">
                        <i class="bi bi-floppy me-1"></i>Salva
                    </button>
                    <a th:href="@{/admin/users}" class="btn btn-outline-secondary">Annulla</a>
                </div>

            </form>
        </div>
    </div>

</main>
</body>
</html>
