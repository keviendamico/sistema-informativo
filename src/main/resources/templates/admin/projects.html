<!DOCTYPE html>
<html lang="it"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::main})}">
<head><title>Commesse</title></head>
<body>
<main>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="mb-0">Commesse</h4>
        <a th:href="@{/admin/projects/new}" class="btn btn-rxt btn-sm">
            <i class="bi bi-plus-lg me-1"></i>Nuova commessa
        </a>
    </div>

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <table class="table table-sm table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Codice</th>
                        <th>Descrizione</th>
                        <th class="text-center">Assenza</th>
                        <th class="text-center">Interno</th>
                        <th class="text-center">Stato</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="p : ${projects}" th:classappend="${!p.active} ? 'text-muted'">
                        <td class="fw-semibold" th:text="${p.code}"></td>
                        <td th:text="${p.description}"></td>
                        <td class="text-center">
                            <i th:if="${p.absence}" class="bi bi-check-circle-fill text-success"></i>
                        </td>
                        <td class="text-center">
                            <i th:if="${p.internal}" class="bi bi-check-circle-fill text-primary"></i>
                        </td>
                        <td class="text-center">
                            <span th:if="${p.active}"  class="badge bg-success">Attiva</span>
                            <span th:if="${!p.active}" class="badge bg-secondary">Inattiva</span>
                        </td>
                        <td class="text-end">
                            <a th:href="@{/admin/projects/{id}/edit(id=${p.id})}"
                               class="btn btn-sm btn-outline-secondary"
                               title="Modifica" data-bs-toggle="tooltip">
                                <i class="bi bi-pencil-square"></i>
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(projects)}">
                        <td colspan="6" class="text-center text-muted py-4">Nessuna commessa presente.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</main>
</body>
</html>
