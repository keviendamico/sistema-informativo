<!DOCTYPE html>
<html lang="it"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::main})}">
<head><title>Utenti</title></head>
<body>
<main>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="mb-0">Utenti</h4>
        <a th:href="@{/admin/users/new}" class="btn btn-rxt btn-sm">
            <i class="bi bi-person-plus me-1"></i>Nuovo utente
        </a>
    </div>

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="table-responsive">
            <table class="table table-sm table-bordered table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Cognome e nome</th>
                        <th>Username</th>
                        <th>Email</th>
                        <th>Ruolo</th>
                        <th>Stato</th>
                        <th class="text-end">Azioni</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(users)}">
                        <td colspan="6" class="text-center text-muted py-4">Nessun utente trovato.</td>
                    </tr>
                    <tr th:each="u : ${users}" th:classappend="${!u.active} ? 'text-muted'">
                        <td th:text="${u.lastName + ' ' + u.firstName}"></td>
                        <td th:text="${u.username}"></td>
                        <td th:text="${u.email}"></td>
                        <td>
                            <span th:switch="${u.role.name()}">
                                <span th:case="'ADMIN'"    class="badge bg-primary">Admin</span>
                                <span th:case="'EMPLOYEE'" class="badge bg-secondary">Employee</span>
                            </span>
                        </td>
                        <td>
                            <span th:if="${u.active}"    class="badge bg-success">Attivo</span>
                            <span th:if="${!u.active}"   class="badge bg-secondary">Inattivo</span>
                        </td>
                        <td class="text-end">
                            <a th:href="@{/admin/users/{id}/edit(id=${u.id})}"
                               class="btn btn-sm btn-outline-secondary"
                               data-bs-toggle="tooltip" title="Modifica">
                                <i class="bi bi-pencil-square"></i>
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</main>
</body>
</html>
