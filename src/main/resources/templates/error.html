<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Errore — Sistema Informativo REXtart</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/webjars/bootstrap-icons/font/bootstrap-icons.min.css}">
    <link rel="stylesheet" th:href="@{/css/custom.css}">
</head>
<body class="d-flex flex-column min-vh-100 bg-light">

<nav class="navbar si-navbar fixed-top">
    <div class="container-fluid px-3">
        <span class="navbar-brand">
            <img th:src="@{/image/logo-rextart.svg}" alt="Rextart" height="22">
        </span>
    </div>
</nav>

<div class="container d-flex flex-column align-items-center justify-content-center flex-grow-1" style="margin-top: 80px;">
    <div class="text-center" style="max-width: 480px;">
        <p class="display-1 fw-bold" style="color: #0f65a2;" th:text="${status ?: ''}"></p>
        <h4 class="mb-2" th:text="${error ?: 'Errore'}"></h4>
        <p class="text-muted mb-4"
           th:text="${message != null and !#strings.isEmpty(message) ? message : 'Si è verificato un errore imprevisto.'}"></p>
        <a href="/timesheet" class="btn btn-rxt">
            <i class="bi bi-house me-1"></i>Torna alla home
        </a>
    </div>
</div>

<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
