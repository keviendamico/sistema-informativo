services:
  rextart-db:
    container_name: rextart-db
    image: postgres:14.22
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - rextart-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  rextart-app:
    container_name: rextart-app
    image: kappa9/rextart-sistema-informativo:1.0.0
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://rextart-db:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      PASSWORD_ADMIN: ${PASSWORD_ADMIN}
    depends_on:
      rextart-db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  rextart-db-data:
